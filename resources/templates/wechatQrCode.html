<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>关注公众号 - 糖糖分享网</title>
  <meta name="description" content="关注糖糖分享网公众号，获取更多虚拟资源、学习资料、考研网课、源码素材信息。咨询客服获取你需要的资源。">
  <meta name="keywords" content="关注公众号,糖糖分享,虚拟资源,学习资料,考研网课,客服联系">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/css/my.css">
</head>
<body>
  <div class="index-embedded-container">
    <div class="fixed-search-container">
      <div class="brand-header-section">
        <div class="brand-content-wrapper">
          <div class="brand-text-wrapper">
            <h1 class="main-brand-title">糖糖分享网</h1>
            <p class="brand-subtitle">技术改变创作未来</p>
          </div>
        </div>
      </div>
    </div>

    <main class="main-content-area">
      <div class="wx-card">
        <div class="wx-header">
          <h1 class="wx-title">关注我们的公众号</h1>
          <p class="wx-subtitle">获取更多优质资源和最新更新</p>
        </div>

      <div class="wx-content">
        <div class="wx-qr-section">
          <div class="qr-container">
            <img src="/img/my.jpg" alt="公众号二维码" class="wx-qr-code">
            <div class="qr-shadow"></div>
          </div>
          <p class="qr-tip">扫码关注「糖糖资源站」</p>
        </div>

        <div class="wx-info-section">
          <h2 class="info-title">关注后你将获得：</h2>
          <ul class="info-list">
            <li class="info-item">
              <span class="info-icon">✓</span>
              <span>添加客服微信 问题在线解答</span>
            </li>
          </ul>
        </div>
      </div>

      <div class="wx-footer">
        <div class="footer-tip">
          <span class="tip-icon">⚠️</span>
          <span>温馨提示：扫码后请回复「资源」获取最新资源链接，回复「客服」获取客服微信</span>
        </div>
        <button class="back-button" onclick="history.back()">
          <span class="icon">←</span> 返回上一页
        </button>
      </div>
      </div>
    </main>

  </div>

  <footer class="site-footer">
    <div class="footer-content">
      <img src="/img/beian.png" alt="备案图标" class="beian-icon">
      <a href="https://beian.mps.gov.cn/#/query/webSearch?code=43021102000399" rel="noreferrer" target="_blank">湘公网安备43021102000399号</a>
      <span class="separator">|</span>
      <a href="https://beian.miit.gov.cn/" target="_blank" style="color: #999; text-decoration: none;">湘ICP备2026011589号</a>
    </div>
  </footer>
</body>
</html>
